name: 重生成色卡交付物

on:
  push:
    paths:
      - "**/colors.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-deliverables-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 准备 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装系统字体
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: 安装 Python 依赖
        run: python -m pip install openpyxl==3.1.5 pillow==12.2.0

      - name: 重生成交付物
        run: python scripts/generate_deliverables.py

      - name: 如有变更则提交并推送
        shell: bash
        run: |
          git config user.name "HansBug"
          git config user.email "hansbug@buaa.edu.cn"

          git add -A
          if git diff --cached --quiet; then
            echo "没有生成变更，跳过提交。"
            exit 0
          fi

          now="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
          changed_count="$(git diff --cached --name-only | wc -l | tr -d ' ')"
          {
            printf '自动重生成色卡交付物：%s\n\n' "$now"
            printf '触发来源：%s\n' "$GITHUB_EVENT_NAME"
            printf '工作流：%s #%s\n' "$GITHUB_WORKFLOW" "$GITHUB_RUN_NUMBER"
            printf '分支：%s\n' "$GITHUB_REF_NAME"
            printf '变更文件数：%s\n\n' "$changed_count"
            printf '变更文件：\n'
            git diff --cached --name-only | sed 's/^/- /'
            printf '\n变更统计：\n'
            git diff --cached --stat
          } > /tmp/commit-message.txt

          git commit -F /tmp/commit-message.txt
          git push
